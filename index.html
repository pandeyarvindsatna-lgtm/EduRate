<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRate - Student Feedback System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .rating-star:hover { transform: scale(1.2); transition: transform 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <!-- Auth Layer -->
    <div id="auth-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-100 p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-200">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-indigo-600 p-3 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                    <i data-lucide="graduation-cap" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold">Welcome to EduRate</h1>
                <p class="text-slate-500 text-sm">Sign in to rate your faculty</p>
            </div>
            
            <form onsubmit="app.handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1.5 ml-1">Student ID / Email</label>
                    <input id="auth-login" type="text" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="e.g. STU202401">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1.5 ml-1">Password</label>
                    <input type="password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98]">
                    Continue
                </button>
            </form>
            <p class="mt-6 text-center text-xs text-slate-400 font-medium uppercase tracking-widest">Only for verified institution members</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3 cursor-pointer" onclick="app.setPage('dashboard')">
                    <div class="bg-indigo-600 p-2 rounded-xl">
                        <i data-lucide="award" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <span class="text-xl font-extrabold tracking-tight text-slate-900">EduRate</span>
                        <div class="text-[10px] font-bold text-indigo-600 uppercase tracking-tighter leading-none">Faculty Feedback</div>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div id="role-indicator" class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-600">
                        <i data-lucide="user-check" class="w-3.5 h-3.5"></i>
                        <span id="user-display">Student</span>
                    </div>
                    <button onclick="app.logout()" class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- App Content Wrapper -->
    <main id="app-viewport" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Views injected here -->
    </main>

    <!-- Notification -->
    <div id="notification-area" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <script>
        // --- DATA LAYER ---
        const DB = {
            departments: ["Computer Science", "Mechanical", "Electrical", "Civil", "Biotechnology"],
            teachers: [
                { id: 1, name: "Dr. Sarah Mitchell", dept: "Computer Science", subject: "Artificial Intelligence", exp: "12 Years", sem: [4, 6, 8] },
                { id: 2, name: "Prof. James Chen", dept: "Computer Science", subject: "Data Structures", exp: "8 Years", sem: [2, 4] },
                { id: 3, name: "Dr. Robert Wilson", dept: "Mechanical", subject: "Thermodynamics", exp: "15 Years", sem: [3, 5] },
                { id: 4, name: "Prof. Elena Rodriguez", dept: "Electrical", subject: "Signal Processing", exp: "6 Years", sem: [4, 6] },
                { id: 5, name: "Dr. Arvinder Singh", dept: "Computer Science", subject: "Operating Systems", exp: "20 Years", sem: [4, 5] }
            ],
            ratings: [
                { id: 101, teacherId: 1, studentId: 'S01', quality: 5, behavior: 4, clarity: 5, feedback: "Excellent teaching style.", sem: 6 },
                { id: 102, teacherId: 1, studentId: 'S02', quality: 4, behavior: 5, clarity: 4, feedback: "Very approachable.", sem: 6 }
            ],
            warnings: []
        };

        const app = {
            currentUser: null,
            isAdmin: false,
            currentPage: 'dashboard',
            selectedTeacher: null,

            // Initialize the application
            init() {
                this.render();
                lucide.createIcons();
            },

            // Auth Logic
            handleLogin(e) {
                e.preventDefault();
                const login = document.getElementById('auth-login').value;
                if (login.toLowerCase() === 'admin') {
                    this.currentUser = { name: "Admin (HOD)", id: "A01" };
                    this.isAdmin = true;
                } else {
                    this.currentUser = { name: "Student User", id: login || "STU-001" };
                    this.isAdmin = false;
                }
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('role-indicator').classList.remove('hidden');
                document.getElementById('user-display').innerText = this.currentUser.name;
                this.render();
            },

            logout() {
                this.currentUser = null;
                this.isAdmin = false;
                document.getElementById('role-indicator').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
            },

            setPage(page, id = null) {
                this.currentPage = page;
                if (id) this.selectedTeacher = DB.teachers.find(t => t.id === parseInt(id));
                this.render();
                window.scrollTo(0, 0);
            },

            notify(msg, type = 'success') {
                const area = document.getElementById('notification-area');
                const n = document.createElement('div');
                n.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl text-white font-bold transition-all transform translate-y-0 ${type === 'success' ? 'bg-emerald-600' : 'bg-amber-500'}`;
                n.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-triangle'}" class="w-5 h-5"></i> ${msg}`;
                area.appendChild(n);
                lucide.createIcons();
                setTimeout(() => {
                    n.classList.add('opacity-0', 'translate-y-2');
                    setTimeout(() => n.remove(), 300);
                }, 3000);
            },

            render() {
                if (!this.currentUser) {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    return;
                }

                const viewport = document.getElementById('app-viewport');
                viewport.innerHTML = ''; // Clear previous content
                
                if (this.isAdmin) {
                    this.renderAdmin(viewport);
                } else {
                    switch(this.currentPage) {
                        case 'dashboard': this.renderStudentDashboard(viewport); break;
                        case 'profile': this.renderTeacherProfile(viewport); break;
                        default: this.renderStudentDashboard(viewport);
                    }
                }
                lucide.createIcons();
            },

            renderStudentDashboard(container) {
                const dept = document.getElementById('filter-dept')?.value || DB.departments[0];
                const sem = document.getElementById('filter-sem')?.value || 4;
                const filteredTeachers = DB.teachers.filter(t => t.dept === dept && t.sem.includes(parseInt(sem)));

                container.innerHTML = `
                    <div class="space-y-8 animate-in fade-in duration-500">
                        <header>
                            <h1 class="text-3xl font-extrabold text-slate-900">Faculty Directory</h1>
                            <p class="text-slate-500 mt-2">Select department and semester to rate your teachers.</p>
                        </header>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Department</label>
                                <select id="filter-dept" onchange="app.render()" class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/10">
                                    ${DB.departments.map(d => `<option ${d === dept ? 'selected' : ''}>${d}</option>`).join('')}
                                </select>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Semester</label>
                                <select id="filter-sem" onchange="app.render()" class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/10">
                                    ${[1,2,3,4,5,6,7,8].map(s => `<option value="${s}" ${s == sem ? 'selected' : ''}>Semester ${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${filteredTeachers.length ? filteredTeachers.map(t => this.teacherCard(t)).join('') : `
                                <div class="col-span-full py-20 text-center bg-white rounded-3xl border border-dashed border-slate-300">
                                    <i data-lucide="search-x" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                                    <h3 class="font-bold text-slate-400">No teachers found for this selection</h3>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            },

            teacherCard(t) {
                const ratings = DB.ratings.filter(r => r.teacherId === t.id);
                const avg = ratings.length ? (ratings.reduce((acc, curr) => acc + (curr.quality + curr.behavior + curr.clarity)/3, 0) / ratings.length).toFixed(1) : "N/A";

                return `
                    <div class="group bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-xl hover:border-indigo-100 transition-all cursor-pointer" onclick="app.setPage('profile', ${t.id})">
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-14 h-14 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-2xl group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                ${t.name.split(' ').pop().charAt(0)}
                            </div>
                            <div class="flex items-center gap-1.5 px-3 py-1 bg-amber-50 text-amber-700 rounded-full text-xs font-bold">
                                <i data-lucide="star" class="w-3 h-3 fill-amber-400"></i> ${avg}
                            </div>
                        </div>
                        <h3 class="text-lg font-bold text-slate-900 mb-1">${t.name}</h3>
                        <p class="text-sm font-medium text-slate-500">${t.subject}</p>
                        <div class="mt-6 flex items-center justify-between">
                            <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">${t.exp} Exp</span>
                            <div class="p-2 bg-slate-50 rounded-lg text-slate-400 group-hover:text-indigo-600 group-hover:bg-indigo-50 transition-all">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderTeacherProfile(container) {
                const t = this.selectedTeacher;
                const ratings = DB.ratings.filter(r => r.teacherId === t.id);
                const alreadyRated = ratings.some(r => r.studentId === this.currentUser.id);

                container.innerHTML = `
                    <div class="max-w-4xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                        <button onclick="app.setPage('dashboard')" class="flex items-center gap-2 text-sm font-bold text-indigo-600 hover:gap-3 transition-all">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Directory
                        </button>

                        <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 flex flex-col md:flex-row gap-8 items-center md:items-start">
                            <div class="w-32 h-32 rounded-[32px] bg-indigo-600 flex items-center justify-center text-white text-5xl font-black shadow-2xl shadow-indigo-200">
                                ${t.name.charAt(4)}
                            </div>
                            <div class="flex-1">
                                <div class="flex flex-col md:flex-row md:items-center gap-3 mb-2">
                                    <h1 class="text-4xl font-black text-slate-900">${t.name}</h1>
                                    <span class="inline-block px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-bold">${t.dept}</span>
                                </div>
                                <p class="text-xl font-medium text-slate-500">${t.subject}</p>
                                <div class="mt-6 flex flex-wrap gap-4">
                                    <div class="px-4 py-2 bg-slate-50 rounded-2xl">
                                        <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Experience</div>
                                        <div class="font-bold text-slate-700">${t.exp}</div>
                                    </div>
                                    <div class="px-4 py-2 bg-slate-50 rounded-2xl">
                                        <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Total Ratings</div>
                                        <div class="font-bold text-slate-700">${ratings.length}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                                    <i data-lucide="edit-3" class="w-5 h-5 text-indigo-600"></i> Submit Rating
                                </h3>
                                
                                ${alreadyRated ? `
                                    <div class="bg-emerald-50 text-emerald-700 p-6 rounded-3xl text-sm font-medium border border-emerald-100">
                                        Feedback received! You can rate this teacher once per semester.
                                    </div>
                                ` : `
                                    <form onsubmit="app.submitRating(event)" class="space-y-6">
                                        ${['Quality', 'Behavior', 'Clarity'].map(metric => `
                                            <div class="space-y-2">
                                                <div class="flex justify-between">
                                                    <label class="text-sm font-bold text-slate-700">${metric}</label>
                                                    <span id="val-${metric}" class="text-xs font-bold text-indigo-600">0/5</span>
                                                </div>
                                                <div class="flex gap-2">
                                                    ${[1,2,3,4,5].map(i => `
                                                        <button type="button" onclick="app.setStars('${metric}', ${i})" 
                                                            class="star-${metric} text-slate-200 hover:text-amber-400 rating-star transition-all" 
                                                            data-value="${i}"><i data-lucide="star" class="w-6 h-6 fill-current"></i></button>
                                                    `).join('')}
                                                </div>
                                                <input type="hidden" id="input-${metric}" value="0">
                                            </div>
                                        `).join('')}
                                        <div class="space-y-2">
                                            <label class="text-sm font-bold text-slate-700">Detailed Feedback</label>
                                            <textarea id="feedback-text" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/10 h-32 text-sm" placeholder="Optional anonymous comments..."></textarea>
                                        </div>
                                        <button class="w-full py-4 bg-slate-900 hover:bg-black text-white font-bold rounded-2xl transition-all shadow-lg active:scale-95">
                                            Submit Anonymously
                                        </button>
                                    </form>
                                `}
                            </div>

                            <div class="space-y-4">
                                <h3 class="text-xl font-bold mb-2 flex items-center gap-2">
                                    <i data-lucide="message-circle" class="w-5 h-5 text-indigo-600"></i> Recent Feedback
                                </h3>
                                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                    ${ratings.length ? ratings.map(r => `
                                        <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                                            <div class="flex gap-1 text-amber-400 mb-2">
                                                ${[1,2,3,4,5].map(i => `<i data-lucide="star" class="w-3 h-3 ${i <= Math.round((r.quality+r.behavior+r.clarity)/3) ? 'fill-current' : ''}"></i>`).join('')}
                                            </div>
                                            <p class="text-slate-600 text-sm italic">"${r.feedback || 'No written feedback provided.'}"</p>
                                            <div class="mt-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sem ${r.sem} • Student Feedback</div>
                                        </div>
                                    `).join('') : '<p class="text-slate-400 text-center py-10">No feedback yet.</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            setStars(metric, val) {
                const stars = document.querySelectorAll(`.star-${metric}`);
                document.getElementById(`input-${metric}`).value = val;
                document.getElementById(`val-${metric}`).innerText = `${val}/5`;
                stars.forEach((s, idx) => {
                    if (idx < val) s.classList.replace('text-slate-200', 'text-amber-400');
                    else s.classList.replace('text-amber-400', 'text-slate-200');
                });
            },

            submitRating(e) {
                e.preventDefault();
                const q = parseInt(document.getElementById('input-Quality').value);
                const b = parseInt(document.getElementById('input-Behavior').value);
                const c = parseInt(document.getElementById('input-Clarity').value);
                const txt = document.getElementById('feedback-text').value;

                if (!q || !b || !c) {
                    this.notify("Please complete all star ratings", "warning");
                    return;
                }

                DB.ratings.push({
                    id: Date.now(),
                    teacherId: this.selectedTeacher.id,
                    studentId: this.currentUser.id,
                    quality: q,
                    behavior: b,
                    clarity: c,
                    feedback: txt,
                    sem: 4
                });

                this.notify("Rating saved anonymously!");
                this.render();
            },

            renderAdmin(container) {
                const ratingsByTeacher = DB.teachers.map(t => {
                    const r = DB.ratings.filter(rat => rat.teacherId === t.id);
                    const avg = r.length ? (r.reduce((a, c) => a + (c.quality + c.behavior + c.clarity)/3, 0) / r.length).toFixed(1) : 0;
                    return { ...t, avg: parseFloat(avg), count: r.length };
                });

                container.innerHTML = `
                    <div class="space-y-8 animate-in fade-in duration-500">
                        <header>
                            <h1 class="text-3xl font-black text-slate-900 tracking-tight">HOD Dashboard</h1>
                            <p class="text-slate-500">Monitoring faculty performance scores.</p>
                        </header>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div class="lg:col-span-2 bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                                <h3 class="text-xl font-bold mb-6">Institute Performance Map</h3>
                                <canvas id="adminChart" class="w-full h-[300px]"></canvas>
                            </div>

                            <div class="bg-slate-900 p-8 rounded-[40px] shadow-2xl text-white">
                                <h3 class="text-xl font-bold mb-6">Quick Overview</h3>
                                <div class="space-y-6">
                                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-3xl">
                                        <div class="text-sm font-medium text-slate-400">Total Submissions</div>
                                        <div class="text-2xl font-black">${DB.ratings.length}</div>
                                    </div>
                                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-3xl">
                                        <div class="text-sm font-medium text-slate-400">Warnings Active</div>
                                        <div class="text-2xl font-black text-amber-400">${DB.warnings.length}</div>
                                    </div>
                                </div>
                                <button class="w-full py-4 mt-8 bg-indigo-600 rounded-2xl font-bold hover:bg-indigo-500 transition-all">Generate Full Report</button>
                            </div>
                        </div>

                        <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden">
                            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                                <h3 class="text-xl font-bold">Faculty Ledger</h3>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-slate-50">
                                        <tr>
                                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Teacher</th>
                                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Dept</th>
                                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest text-center">Avg Score</th>
                                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest text-right">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-50">
                                        ${ratingsByTeacher.map(t => `
                                            <tr class="hover:bg-slate-50 transition-colors">
                                                <td class="p-5">
                                                    <div class="flex items-center gap-3 font-bold text-slate-900">${t.name}</div>
                                                </td>
                                                <td class="p-5 text-sm text-slate-500 font-medium">${t.dept}</td>
                                                <td class="p-5">
                                                    <div class="flex justify-center">
                                                        <span class="px-3 py-1 ${t.avg >= 4 ? 'bg-emerald-50 text-emerald-600' : t.avg >= 2.5 ? 'bg-amber-50 text-amber-600' : 'bg-red-50 text-red-600'} rounded-full text-sm font-bold">
                                                            ${t.avg || 'N/A'}
                                                        </span>
                                                    </div>
                                                </td>
                                                <td class="p-5 text-right">
                                                    <button onclick="app.sendWarning(${t.id})" class="p-2 ${DB.warnings.includes(t.id) ? 'text-amber-500' : 'text-slate-300 hover:text-indigo-600'} transition-colors">
                                                        <i data-lucide="mail-warning" class="w-5 h-5"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => this.initAdminChart(ratingsByTeacher), 10);
            },

            initAdminChart(data) {
                const ctx = document.getElementById('adminChart');
                if (!ctx) return;
                
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(t => t.name.split(' ').pop()),
                        datasets: [{
                            label: 'Avg Score',
                            data: data.map(t => t.avg),
                            backgroundColor: '#4f46e5',
                            borderRadius: 12,
                            barThickness: 30
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { min: 0, max: 5, grid: { color: '#f1f5f9' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            },

            sendWarning(id) {
                if (!DB.warnings.includes(id)) {
                    DB.warnings.push(id);
                    this.notify("Warning sent to faculty member", "warning");
                    this.render();
                } else {
                    this.notify("Faculty already warned", "warning");
                }
            }
        };

        // Window load listener
        window.onload = function() {
            app.init();
        };
    </script>
</body>
</html>
